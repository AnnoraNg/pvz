function plantSprite(p,dmg){
  switch(p.key){
    case 'sunshroom':  return (p.age||0)>60?'sunshroom_big':'sunshroom';
    case 'wallnut':    return dmg>.66?'wallnut':dmg>.33?'wallnut_cracked1':'wallnut_cracked2';

    case 'potatomine': return p.armT>=14?'potatomine_armed':'potatomine_buried';
    case 'chomper':    return p.chewT>0?'chomper_chewing':'chomper';
    default: return p.key;
  }
}
function zombieSpriteName(z){
  if((z.type==='cone'||z.type==='bucket'||z.type==='football'||z.type==='screendoor') && z.armor<=0) return 'zombie_normal';
  if(z.type==='polevault' && !z.vault) return ASSETS.zombie_polevault_nopole ? 'zombie_polevault_nopole' : 'zombie_normal';
  if(z.type==='newspaper' && z.armor<=0) return ASSETS.zombie_newspaper_angry ? 'zombie_newspaper_angry' : 'zombie_normal';
  return 'zombie_'+z.type;
}

/* ============================================================
   Audio (Web Audio API, fully synthesized — no files needed)
   ============================================================ */
let AC = null, muted = false, musicTimer = null;
function audioInit(){
  if(AC) return;
  try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  startMusic();
}
function tone(f, dur, type='square', vol=.12, slide=0, when=0){
  if(!AC || muted) return;
  const t0 = AC.currentTime + when;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, f+slide), t0+dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(.001, t0+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t0); o.stop(t0+dur+.02);
}
function noiseBurst(dur=.08, vol=.2, freq=1200, when=0){
  if(!AC || muted) return;
  const t0 = AC.currentTime + when;
  const n = Math.floor(AC.sampleRate*dur);
  const buf = AC.createBuffer(1, n, AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*(1-i/n);
  const s = AC.createBufferSource(); s.buffer = buf;
  const f = AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=1.2;
  const g = AC.createGain(); g.gain.value = vol;
  s.connect(f); f.connect(g); g.connect(AC.destination);
  s.start(t0);
}
function sfx(name){
  if(!AC || muted) return;
  switch(name){
    // each shooter has its own voice
    case 'shoot_pea':      tone(300,.07,'sine',.16,-140); noiseBurst(.04,.1,400); break;
    case 'shoot_snow':     tone(880,.09,'sine',.13,220); noiseBurst(.05,.1,3000); break;
    case 'shoot_repeater': noiseBurst(.05,.25,650);  tone(400,.08,'sawtooth',.09,-150); break;
    // hits
    case 'hit_pea':        noiseBurst(.07,.28,500);  tone(180,.06,'square',.09,-60); break;
    case 'hit_snow':       tone(1400,.1,'sine',.11,-500); tone(2100,.08,'sine',.07,-700); break;
    case 'sun':            tone(660,.09,'sine',.14); tone(990,.12,'sine',.11,0,.06); break;
    case 'plant':          noiseBurst(.09,.22,300);  tone(220,.08,'sine',.11,60); break;
    case 'shovel':         noiseBurst(.1,.28,800); break;
    case 'boom':           noiseBurst(.5,.5,150);    tone(80,.4,'sine',.28,-40); break;
    case 'mower':          noiseBurst(.6,.32,400);   tone(120,.5,'sawtooth',.11,80); break;
    case 'chomp':          noiseBurst(.12,.32,250);  tone(140,.15,'square',.13,-70); break;
    case 'wave':           tone(196,.5,'sawtooth',.13); tone(185,.5,'sawtooth',.11,0,.5); break;
    case 'vault':          tone(240,.25,'sine',.12,260); break;
    case 'shoot_puff':     noiseBurst(.05,.14,600); break;
    case 'fume':           noiseBurst(.18,.2,300); tone(160,.15,'sine',.08,-40); break;
    case 'dance':          [392,494,587].forEach((f,i)=>tone(f,.12,'square',.1,0,i*.09)); break;
    case 'win':            [523,659,784,1047].forEach((f,i)=>tone(f,.22,'triangle',.15,0,i*.13)); break;
    case 'lose':           [392,330,262,196].forEach((f,i)=>tone(f,.3,'sawtooth',.13,0,i*.22)); break;
  }
}

let musicIdx = 0, musicStep = 0;
try{ musicIdx = clamp(parseInt(localStorage.getItem('pvz_music')||'0'),0,TRACKS.length-1); }catch(e){}
function musicTick(){
  const T = TRACKS[musicIdx];
  if(AC && !muted){
    const beat = musicStep % T.mel.length;
    if(beat % T.bassEvery === 0) tone(T.base/2*(beat===0?1:.75), T.step/1000*1.4, 'triangle', T.vol*1.6);
    const n = T.mel[beat];
    if(n!==null && n!==undefined) tone(T.base*Math.pow(2,n/12), T.step/1000*0.75, T.wave, T.vol);
    if(T.hat && beat%8===4) noiseBurst(.03,.04,6000);
    musicStep++;
  }
  musicTimer = setTimeout(musicTick, T.step);
}
function startMusic(){ if(!musicTimer) musicTick(); }
function cycleMusic(){
  musicIdx = (musicIdx+1) % TRACKS.length;
  musicStep = 0;
  try{ localStorage.setItem('pvz_music', String(musicIdx)); }catch(e){}
}

  const set = new Set(VS_BASE_PALETTE);

}

  if(LEVELS[i].plants.length > MAXSLOTS){
    chooseLevelIdx = i;
    chosen = LEVELS[i].plants.slice(0, MAXSLOTS);
    state = 'choose';
  } else newGame(i);
}

function newGame(idx, seedKeys){
  levelIdx = idx;
  const L = LEVELS[idx];
  lastSeeds = (seedKeys && seedKeys.length) ? seedKeys.slice() : null;
  // mid-level huge-wave trigger points (final wave handled separately)
  const nMid = Math.max(0, (L.waves||1)-1);
  const trickleTotal = L.total - L.hugeWave;
  G = {
    L,
    sun: L.startSun||150,
    grid: Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    zombies: [], projectiles: [], suns: [], fx: [],
    mowers: Array.from({length:ROWS},(_,r)=>({row:r, x:GRID_X-58, active:false, gone:false})),
    seeds: (lastSeeds||L.plants).map(k=>({key:k, cd:0})),
    selected: null, shovel: false,
    t: 0, skySunT: 5,
    spawned: 0, killed: 0, spawnT: 12,   // grace period before the first zombie
    hugeDone: false, hugeBanner: 0, startBanner: 2.5,
    worldBanner: L.world!=='day' ? 10 : 0,
    waveThresholds: Array.from({length:nMid},(_,i)=>Math.floor(trickleTotal*(i+1)/(nMid+1))),
    waveIdx: 0,
    graves: [],
  };
  // night/fog: scatter graves on the right half of the lawn (block planting, spawn extra final-wave zombies)
  if(L.graves){
    const spots = [];
    for(let r=0;r<ROWS;r++) for(let c=4;c<COLS;c++) spots.push({r,c});
    for(let i=0;i<L.graves && spots.length;i++){
      G.graves.push(spots.splice(Math.floor(rnd(0,spots.length)),1)[0]);
    }
  }
  paused = false;
  gameSpeed = 1;
  state = 'playing';
}

// Build a fresh versus match on the given level with the plant player's seed loadout.
function newVersus(idx, seedKeys){
  levelIdx = idx;
  const L = LEVELS[idx];
  lastSeeds = (seedKeys && seedKeys.length) ? seedKeys.slice() : L.plants.slice(0, MAXSLOTS);
  const palette = versusZombiePalette(L);
  // scale the attacker's economy with the level so bigger plant loadouts stay beatable
  const startBrains = VS.startBrains + idx*VS.brainsPerLevel;
  const baseRate = VS.baseRate + idx*VS.ratePerLevel;
  G = {
    L, versus:true,
    sun: VS.startSun,
    grid: Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    zombies: [], projectiles: [], suns: [], fx: [],
    mowers: Array.from({length:ROWS},(_,r)=>({row:r, x:GRID_X-58, active:false, gone:false})),
    seeds: lastSeeds.map(k=>({key:k, cd:0})),
    selected: null, shovel: false,
    // zombie player's economy
    brains: startBrains,
    incomeLevel: 1,
    baseRate,
    brainRate: baseRate,
    gspawnCd: 0,
    zseeds: palette.map(k=>({key:k, cd:0})),
    zselected: null,
    t: 0, skySunT: 5,
    matchTime: VS.matchTime,
    spawnGrace: VS.spawnGrace,
    winner: null,
    startBanner: 2.5,
    worldBanner: L.world!=='day' ? 10 : 0,
    graves: [],
  };
  if(L.graves){
    const spots = [];
    for(let r=0;r<ROWS;r++) for(let c=4;c<COLS;c++) spots.push({r,c});
    for(let i=0;i<L.graves && spots.length;i++)
      G.graves.push(spots.splice(Math.floor(rnd(0,spots.length)),1)[0]);
  }
  paused = false; gameSpeed = 1;
  state = 'mp_playing';
}

// The zombie player buys a zombie into a row (validated against brains + cooldown).
function versusSpawn(ztype, row){
  if(!G || !G.versus) return false;
  if(G.spawnGrace>0) return false;
  if(G.gspawnCd>0) return false;          // global throttle: can't dump the whole horde at once
  const z = G.zseeds.find(s=>s.key===ztype);
  const def = ZCOST[ztype];
  if(!z || !def || z.cd>0 || G.brains < def.cost) return false;
  G.brains -= def.cost;
  z.cd = def.cd;
  G.gspawnCd = VS.globalSpawnGap;
  G.zombies.push(makeZombie(ztype, clamp(row,0,ROWS-1)));
  sfx('plant');
  return true;
}

// The zombie player re-invests brains to raise the regen rate (Battle-Cats worker).
function versusUpgradeIncome(){
  if(!G || !G.versus) return false;
  if(G.incomeLevel >= VS.maxIncome) return false;
  const cost = VS.incomeBase + (G.incomeLevel-1)*VS.incomeStep;
  if(G.brains < cost) return false;
  G.brains -= cost;
  G.incomeLevel++;
  G.brainRate = (G.baseRate||VS.baseRate) + (G.incomeLevel-1)*VS.ratePerLvl;
  sfx('sun');
  return true;
}
function incomeCost(){ return VS.incomeBase + (G.incomeLevel-1)*VS.incomeStep; }

function burst(n){
  const L = G.L;
  for(let i=0;i<n && G.spawned<L.total;i++){
    const z = makeZombie(i===0?'flag':pickType(L.types), Math.floor(rnd(0,ROWS)));
    z.x += i*28;
    G.zombies.push(z); G.spawned++;
  }
}

/* ============================================================
   Entities
   ============================================================ */
function makePlant(key, r, c){
  const d = PLANTS[key];
  return { key, r, c, hp:d.hp, maxHp:d.hp, t:0,
    shootT: rnd(0,0.6),
    sunT: rnd(4,7),
    armT: 0,             // potato mine arming
    fuse: (key==='cherrybomb'||key==='jalapeno') ? 1.0 : -1,
    chewT: 0,            // chomper digesting
    squashT: -1, tx: 0,  // squash jump timer + target x
    wob: rnd(0,6.28) };
}

function makeZombie(type, row){
  const d = ZOMBIES[type];
  return { type, row,
    x: GRID_R + rnd(10,70),
    hp: d.hp, armor: d.armor, maxArmor: d.armor,
    speed: d.speed * rnd(0.92,1.08),
    slow: 0, eating: null, dead: 0, walk: rnd(0,6.28),
    vault: type==='polevault', jackT: rnd(6,16),
    jumpT: 0, jumpFrom: 0, jumpTo: 0, angry: false };
}

function spawnFx(x,y,kind,txt){
  G.fx.push({x,y,kind,txt,t:0});
}

/* ============================================================
   Update
   ============================================================ */
function update(dt){
  if(paused || !G) return;
  if(G.versus){
    // host (and local hotseat) run the authoritative sim; the guest only renders snapshots
    if(state!=='mp_playing' || netRole==='guest') return;
  } else {
    if(state!=='playing') return;
  }
  G.t += dt;
  if(G.startBanner>0) G.startBanner-=dt;
  if(G.hugeBanner>0) G.hugeBanner-=dt;
  if(G.worldBanner>0) G.worldBanner-=dt/gameSpeed;
  if(shake>0) shake-=dt;

  // seed cooldowns
  for(const s of G.seeds) if(s.cd>0) s.cd-=dt;

  // sky sun (never falls at night or in fog)
  if(G.L.world==='day') G.skySunT -= dt;
  if(G.skySunT<=0){
    G.skySunT = rnd(8,11);
    G.suns.push({x:rnd(GRID_X+30,GRID_R-30), y:-20, ty:rnd(GRID_Y+40,GRID_Y+ROWS*CELL_H-40), v:55, val:25, life:8, wob:rnd(0,6.28)});
  }

  // ---- versus economy + match timer (zombie player buys zombies; no scripted waves) ----
  if(G.versus){
    if(G.spawnGrace>0) G.spawnGrace -= dt;
    if(G.gspawnCd>0) G.gspawnCd -= dt;
    G.brains = Math.min(VS.brainCap, G.brains + G.brainRate*dt);
    for(const z of G.zseeds) if(z.cd>0) z.cd-=dt;
    G.matchTime -= dt;
    if(G.matchTime<=0 && !G.winner){ G.matchTime=0; endVersus('plants'); }
  }

  // ---- spawning ----
  const L = G.L;
  const prog = G.spawned / L.total;
  if(!G.versus && G.spawned < L.total){
    // mid-level flag waves (mercy: wait until the field thins out a bit)
    if(G.waveIdx < G.waveThresholds.length && G.spawned >= G.waveThresholds[G.waveIdx] && G.zombies.length < 10){
      G.waveIdx++; G.hugeBanner = 3; sfx('wave');
      burst(Math.ceil(L.hugeWave*0.45));
    // final huge wave
    } else if(!G.hugeDone && L.total - G.spawned <= L.hugeWave && G.zombies.length < 4){
      G.hugeDone = true; G.hugeBanner = 3; sfx('wave');
      burst(L.hugeWave);
      // graves crack open and spawn extra zombies right on the lawn
      for(const gr of G.graves){
        const z = makeZombie(pickType(L.types), gr.r);
        z.x = cellX(gr.c)+CELL_W/2;
        G.zombies.push(z); // extras: not counted toward spawned
      }
    } else if(!G.hugeDone){
      G.spawnT -= dt;
      if(G.spawnT<=0){
        const gap = L.spawnGap[0] + (L.spawnGap[1]-L.spawnGap[0])*prog;
        G.spawnT = gap * rnd(0.8,1.2);
        let t = pickType(L.types);
        // no heavy hitters during the first 20% — time to build economy
        if(prog < 0.2 && (t==='bucket'||t==='football'||t==='jack'||t==='polevault'||t==='screendoor'||t==='dancer'))
          t = Math.random()<.5 ? 'normal' : 'cone';
        G.zombies.push(makeZombie(t, Math.floor(rnd(0,ROWS))));
        G.spawned++;
      }
    }
  }

  updatePlants(dt);
  updateZombies(dt);
  updateProjectiles(dt);
  updateSuns(dt);
  updateMowers(dt);
  G.fx = G.fx.filter(f=>(f.t+=dt) < 1);

  // ---- win (solo only) ----
  if(!G.versus && G.spawned>=L.total && G.zombies.length===0){
    state='won'; sfx('win');
    unlocked = clamp(Math.max(unlocked, levelIdx+2), 1, LEVELS.length);
    saveProgress();
  }
}

// End a versus match and (if host) tell the guest who won.
function endVersus(winner){
  if(G.winner) return;
  G.winner = winner;
  state = 'mp_over';
  sfx(winner==='plants' ? 'win' : 'lose');
  if(netRole==='host') netSend({t:'over', winner});
}

function pickType(weights){
  let r = Math.random(), acc=0;
  for(const k in weights){ acc+=weights[k]; if(r<=acc) return k; }
  return 'normal';
}

function updatePlants(dt){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p = G.grid[r][c]; if(!p) continue;
    p.t += dt;
    if(p.hp<=0 && p.key!=='cherrybomb'){ G.grid[r][c]=null; continue; }
    const px = cellX(c)+CELL_W/2, py = cellY(r)+CELL_H/2;
    // mushrooms sleep during day levels
    p.asleep = !!PLANTS[p.key].shroom && G.L.world==='day';
    if(p.asleep) continue;

    switch(p.key){
      case 'sunflower':
        p.sunT -= dt;
        if(p.sunT<=0){ p.sunT = rnd(9,11);
          G.suns.push({x:px+rnd(-14,14), y:py-10, ty:py+rnd(6,20), v:40, val:25, life:8, wob:rnd(0,6.28)});
        }
        break;
      case 'sunshroom':
        p.age = (p.age||0) + dt;
        p.sunT -= dt;
        if(p.sunT<=0){ p.sunT = rnd(9,11);
          G.suns.push({x:px+rnd(-12,12), y:py-8, ty:py+rnd(6,18), v:40, val:p.age>60?25:15, life:8, wob:rnd(0,6.28)});
        }
        break;
      case 'puffshroom': {
        if(!zombieAhead(r,c,3)) break;
        p.shootT -= dt;
        if(p.shootT<=0){
          p.shootT = 1.45;
          G.projectiles.push({x:px+14,y:py+4,row:r,dmg:20,frozen:false,v:300,maxX:px+3*CELL_W+30,puff:true,src:p.key});
          sfx('shoot_puff');
        }
        break;
      }
      case 'fumeshroom': {
        p.shootT -= dt;
        if(p.shootT<=0){
          let hitAny = false;
          const range = px + 4*CELL_W;
          for(const z of G.zombies){
            if(z.row===r && !z.dead && !z.hypno && z.x>px && z.x<range){
              if(z.type==='screendoor') z.hp -= 25;          // fumes pass the door
              else if(z.armor>0){ z.armor-=25; if(z.armor<0){ z.hp+=z.armor; z.armor=0; } }
              else z.hp -= 25;
              hitAny = true;
            }
          }
          if(hitAny){
            p.shootT = 1.8;
            G.fx.push({x:px+12, y:py-14, kind:'fume', t:0, len:4*CELL_W});
            sfx('fume');
          } else p.shootT = 0.2;
        }
        break;
      }
      case 'peashooter': case 'snowpea': case 'repeater': {
        if(!zombieAhead(r,c)) break;
        p.shootT -= dt;
        if(p.shootT<=0){
          p.shootT = 1.45;
          const frozen = p.key==='snowpea';
          G.projectiles.push({x:px+18,y:py-16,row:r,dmg:20,frozen,v:330,src:p.key});
          if(p.key==='repeater') G.projectiles.push({x:px-6,y:py-16,row:r,dmg:20,frozen:false,v:330,delay:0.12,src:p.key});
          sfx(p.key==='snowpea'?'shoot_snow':p.key==='repeater'?'shoot_repeater':'shoot_pea');
        }
        break;
      }
      case 'cherrybomb':
        p.fuse -= dt;
        if(p.fuse<=0){
          explode(r,c,1,1800);
          G.grid[r][c]=null;
        }
        break;
      case 'potatomine':
        p.armT += dt;
        if(p.armT>=14){
          // explode on contact
          for(const z of G.zombies){
            if(z.row===r && !z.dead && !z.hypno && Math.abs((z.x) - px) < CELL_W*0.5){
              explode(r,c,0,1800); G.grid[r][c]=null; break;
            }
          }
        }
        break;
      case 'squash': {
        if(p.squashT>=0){
          p.squashT -= dt;
          if(p.squashT<=0){
            sfx('boom'); shake = .2;
            spawnFx(p.tx, py, 'hit');
            for(const z of G.zombies)
              if(z.row===r && !z.dead && Math.abs(z.x-p.tx)<60){ z.armor=0; z.hp-=1800; }
            G.grid[r][c]=null;
          }
        } else {
          for(const z of G.zombies){
            if(z.row===r && !z.dead && !z.hypno && z.x>px-CELL_W*0.6 && z.x<px+CELL_W*1.15){
              p.squashT = .5; p.tx = z.x; break;
            }
          }
        }
        break;
      }
      case 'jalapeno':
        p.fuse -= dt;
        if(p.fuse<=0){
          sfx('boom'); shake = .3;
          G.fx.push({x:GRID_X, y:py, kind:'firerow', t:0, row:r});
          for(const z of G.zombies) if(z.row===r){ z.armor=0; z.hp-=1800; }
          G.grid[r][c]=null;
        }
        break;
      case 'chomper':
        if(p.chewT>0){ p.chewT-=dt; break; }
        for(const z of G.zombies){
          if(z.row===r && !z.dead && !z.hypno && z.x > px-10 && z.x < px+CELL_W*1.3){
            z.armor=0; z.hp-=1000;
            if(z.hp<=0){ p.chewT = 20; spawnFx(px,py-30,'chomp'); sfx('chomp'); }
            else spawnFx(z.x,py-40,'hit');
            break;
          }
        }
        break;
    }
  }
}

function zombieAhead(r,c,rangeCells){
  const x0 = cellX(c)+CELL_W/2;
  const maxX = rangeCells ? x0 + rangeCells*CELL_W : GRID_R+60;
  return G.zombies.some(z=>z.row===r && !z.dead && !z.hypno && z.x> x0-10 && z.x < maxX);
}
function graveAt(r,c){ return G.graves.some(g=>g.r===r && g.c===c); }

function explode(r,c,radius,dmg){
  shake = 0.35;
  sfx('boom');
  spawnFx(cellX(c)+CELL_W/2, cellY(r)+CELL_H/2, 'boom');
  for(const z of G.zombies){
    if(Math.abs(z.row-r)<=radius){
      const zx = Math.floor((z.x-GRID_X)/CELL_W);
      if(Math.abs(zx-c)<=radius+0.2){ z.armor=0; z.hp-=dmg; }
    }
  }
}

function updateZombies(dt){
  for(const z of G.zombies){
    if(z.hp<=0 && !z.dead){
      z.dead=0.001; G.killed++;
      // house rule: some zombies drop sun (heavies more often)
      const dropChance = z.maxArmor>=1000 ? .25 : .1;
      if(Math.random() < dropChance){
        const zy = cellY(z.row)+30;
        G.suns.push({x:z.x, y:zy, ty:zy+30, v:60, val:25, life:6, wob:rnd(0,6.28)});
      }
    }
    if(z.dead){ z.dead+=dt; continue; }
    if(z.slow>0) z.slow-=dt;
    z.walk += dt*6;

    // hypnotized zombies walk right and fight for you
    if(z.hypno){
      let foe = null;
      for(const e of G.zombies){
        if(!e.hypno && !e.dead && e.row===z.row && e.x>z.x-10 && e.x<z.x+36){ foe=e; break; }
      }
      if(foe){
        if(foe.armor>0){ foe.armor-=100*dt; if(foe.armor<0){ foe.hp+=foe.armor; foe.armor=0; } }
        else foe.hp -= 100*dt;
        z.hp -= 60*dt;             // the horde fights back
      } else {
        z.x += z.speed*dt;
        if(z.x > GRID_R+70){ z.hp=0; }   // wanders off
      }
      continue;
    }

    // dancer summons backup dancers partway across the lawn
    if(z.type==='dancer' && !z.summoned && z.x < GRID_X + 6.8*CELL_W){
      z.summoned = true;
      sfx('dance');
      for(const dr of [z.row-1, z.row+1]){
        if(dr<0||dr>=ROWS) continue;
        const b = makeZombie('backup', dr); b.x = z.x; G.zombies.push(b);
      }
      const b2 = makeZombie('backup', z.row); b2.x = z.x+55; G.zombies.push(b2);
    }

    // pole-vault jump in progress
    if(z.jumpT>0){
      z.jumpT -= dt;
      const f = clamp(1 - z.jumpT/0.5, 0, 1);
      z.x = z.jumpFrom + (z.jumpTo - z.jumpFrom)*f;
      if(z.jumpT<=0) z.speed = 11*rnd(0.92,1.08);
      continue;
    }
    // newspaper zombie rages when his paper is destroyed
    if(z.type==='newspaper' && z.armor<=0 && !z.angry){ z.angry=true; z.speed=30; }
    // jack-in-the-box: random detonation destroys nearby plants
    if(z.type==='jack' && !z.hypno && z.x < GRID_R){
      z.jackT -= dt;
      if(z.jackT<=0){
        sfx('boom'); shake = .35;
        spawnFx(z.x, cellY(z.row)+CELL_H/2, 'boom');
        const zc = Math.floor((z.x-GRID_X)/CELL_W);
        for(let rr=Math.max(0,z.row-1); rr<=Math.min(ROWS-1,z.row+1); rr++)
          for(let cc=Math.max(0,zc-1); cc<=Math.min(COLS-1,zc+1); cc++)
            G.grid[rr][cc]=null;
        z.armor=0; z.hp=0;
        continue;
      }
    }

    // find plant to eat
    const col = Math.floor((z.x - 22 - GRID_X)/CELL_W);
    let target = null;
    if(col>=0 && col<COLS){
      const p = G.grid[z.row][col];
      if(p && p.key!=='cherrybomb' && p.key!=='jalapeno') target = {p,col};
    }
    if(target && z.vault){
      // pole vaulter jumps the first plant he meets — unless it's a tall-nut
      z.vault = false;
      if(target.p.key!=='tallnut'){
        z.jumpT = 0.5; z.jumpFrom = z.x; z.jumpTo = cellX(target.col)-26;
        sfx('vault');
        continue;
      }
      z.speed = 11*rnd(0.92,1.08);
    }
    if(target){
      z.eating = target;
      target.p.hp -= EAT_DPS*dt;
      if(target.p.hp<=0){
        // hypno-shroom: eating it turns the zombie
        if(target.p.key==='hypnoshroom'){ z.hypno=true; z.slow=0; z.eating=null; }
        G.grid[z.row][target.col]=null; z.eating=null;
      }
    } else {
      z.eating = null;
      const sp = z.speed * (z.slow>0?0.5:1);
      z.x -= sp*dt;
    }

    // reached the house?
    if(z.x < GRID_X - 20){
      const m = G.mowers[z.row];
      if(!m.gone && !m.active){ m.active = true; sfx('mower'); }
      else if(m.gone && z.x < GRID_X - 70){
        if(G.versus){ if(state==='mp_playing') endVersus('zombies'); }
        else if(state==='playing'){ state='lost'; sfx('lose'); }
      }
    }
  }
  G.zombies = G.zombies.filter(z=>!(z.dead && z.dead>0.8));
}

function updateProjectiles(dt){
  for(const pr of G.projectiles){
    if(pr.delay>0){ pr.delay-=dt; continue; }
    pr.x += pr.v*dt;
    // torchwood ignites passing peas (2x damage, thaws frozen)
    if(!pr.fire){
      const tc = Math.floor((pr.x-GRID_X)/CELL_W);
      if(tc>=0 && tc<COLS){
        const tw = G.grid[pr.row][tc];
        if(tw && tw.key==='torchwood'){ pr.fire=true; pr.frozen=false; pr.dmg=40; }
      }
    }
    for(const z of G.zombies){
      if(z.dead || z.hypno || z.row!==pr.row) continue;
      if(Math.abs(z.x - pr.x) < 16 && pr.x < z.x+14){
        let d = pr.dmg;
        if(z.armor>0){ z.armor-=d; if(z.armor<0){ z.hp+=z.armor; z.armor=0; } }
        else z.hp-=d;
        if(pr.frozen) z.slow = 5;
        pr.hit = true;
        spawnFx(pr.x, cellY(z.row)+40, pr.fire?'firehit':pr.frozen?'snowhit':'hit');
        sfx(pr.frozen?'hit_snow':'hit_pea');
        break;
      }
    }
  }
  G.projectiles = G.projectiles.filter(p=>!p.hit && p.x < W+20 && !(p.maxX && p.x > p.maxX));
}

function updateSuns(dt){
  for(const s of G.suns){
    if(s.id==null) s.id = sunSeq++;   // stable id so the guest can collect a specific sun
    if(s.y < s.ty) s.y = Math.min(s.ty, s.y + s.v*dt);
    else s.life -= dt/gameSpeed;   // suns despawn in real time, not sim time — stays collectible at 2x/4x/8x
    s.wob += dt*3;
  }
  G.suns = G.suns.filter(s=>s.life>0 && !s.taken);
}

function updateMowers(dt){
  for(const m of G.mowers){
    if(!m.active || m.gone) continue;
    m.x += 320*dt;
    for(const z of G.zombies){
      if(z.row===m.row && !z.dead && Math.abs(z.x-m.x)<34){ z.armor=0; z.hp=0; }
    }
    if(m.x > GRID_R+40) m.gone = true;
  }
}

/* ============================================================
   Drawing
   ============================================================ */
function draw(){
  ctx.save();
  if(shake>0) ctx.translate(rnd(-4,4)*shake*3, rnd(-4,4)*shake*3);

  const inGame = (state==='playing'||state==='mp_playing'||state==='won'||state==='lost'||state==='mp_over');
  const world = (G && inGame) ? G.L.world : 'day';
  drawBackground(world);

  if(state==='home'){ drawHome(); ctx.restore(); return; }
  if(state==='lobby'){ drawLobby(); ctx.restore(); return; }
  if(state==='menu'){ drawMenu(); ctx.restore(); return; }
  if(state==='choose'||state==='mp_choose'){ drawChoose(); ctx.restore(); return; }
  if(state==='mp_wait'){ drawWait(); ctx.restore(); return; }

  drawLawn();
  if(world!=='day' && !ASSETS.background_night) drawNightTint();
  drawGraves();
  drawMowers();
  // plants
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p=G.grid[r][c]; if(p) drawPlant(p, cellX(c)+CELL_W/2, cellY(r)+CELL_H/2);
  }
  // zombies (sorted by row so lower rows draw in front)
  const zs=[...G.zombies].sort((a,b)=>a.row-b.row);
  for(const z of zs) drawZombie(z);
  // projectiles
  for(const pr of G.projectiles){ if(pr.delay>0) continue;
    const prim = ASSETS[pr.puff?'puff':pr.fire?'firepea':pr.frozen?'frozenpea':'pea'];
    if(prim){ ctx.drawImage(prim, pr.x-12, pr.y-12, 24, 24); continue; }
    if(pr.fire){ ctx.save(); ctx.globalAlpha=.5; ctx.fillStyle='#ffb04a';
      ctx.beginPath(); ctx.arc(pr.x-6,pr.y,10,0,7); ctx.fill(); ctx.restore(); }
    ctx.beginPath(); ctx.arc(pr.x,pr.y,pr.puff?5:7,0,7);
    ctx.fillStyle = pr.puff?'#b48ad4':pr.fire?'#ff8c2a':pr.frozen?'#79d2f2':'#5ec431'; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=2; ctx.stroke();
  }
  drawFx();
  if(world==='fog') drawFogLayer();
  // suns on top (above the fog so they stay collectible)
  for(const s of G.suns) drawSun(s.x, s.y+Math.sin(s.wob)*3, 22, s.life<2 ? .4+.6*Math.abs(Math.sin(s.life*6)) : 1);

  if(G.versus){ drawVersusHUD(); }
  else { drawTopBar(); drawProgress(); }
  drawBanners();

  if(state==='playing'){
    drawMiniButtons();
    if(paused) drawPauseMenu();
  }

  if(state==='won') drawOverlay('LEVEL COMPLETE!', levelIdx+1<LEVELS.length ? 'Next level unlocked' : 'You beat the game!', '#ffd24a');
  if(state==='lost') drawOverlay('THE ZOMBIES ATE YOUR BRAINS!', 'Click to try again', '#ff6a6a');
  if(state==='mp_over') drawVersusOver();

  // shovel / seed / spawn ghost
  if(state==='playing' && !paused) drawCursorGhost();
  if(state==='mp_playing') drawVersusGhost();
  ctx.restore();
}

function drawBackground(world){
  if(world && world!=='day' && ASSETS.background_night){ ctx.drawImage(ASSETS.background_night,0,0,W,H); return; }
  if(ASSETS.background){ ctx.drawImage(ASSETS.background,0,0,W,H); return; }
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#8ec9e8'); g.addColorStop(.5,'#a8d8ef'); g.addColorStop(.52,'#4c7a2e'); g.addColorStop(1,'#3c6423');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // house hint on left
  ctx.fillStyle='#7a5a43'; ctx.fillRect(0,120,70,H-120);
  ctx.fillStyle='#8f6c52'; ctx.fillRect(0,120,70,14);
  ctx.fillStyle='#5b4232';
  for(let y=160;y<H;y+=60) ctx.fillRect(8,y,54,34);
}

function drawLawn(){
  if(ASSETS.background) return; // grid is baked into the background image
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    ctx.fillStyle = (r+c)%2===0 ? '#69a83f' : '#5c9636';
    ctx.fillRect(cellX(c), cellY(r), CELL_W, CELL_H);
  }
  ctx.strokeStyle='rgba(0,0,0,.12)'; ctx.lineWidth=2;
  ctx.strokeRect(GRID_X, GRID_Y, COLS*CELL_W, ROWS*CELL_H);
}

function drawNightTint(){
  ctx.fillStyle='rgba(15,20,55,.42)'; ctx.fillRect(0,0,W,H);
  // moon
  const g = ctx.createRadialGradient(880,55,8,880,55,44);
  g.addColorStop(0,'#f5f2dc'); g.addColorStop(.5,'#e8e2b8'); g.addColorStop(1,'rgba(230,225,180,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(880,55,44,0,7); ctx.fill();
}

function drawGraves(){
  if(!G || !G.graves.length) return;
  for(const gr of G.graves){
    const x = cellX(gr.c)+CELL_W/2, y = cellY(gr.r)+CELL_H/2;
    if(ASSETS.grave){ ctx.drawImage(ASSETS.grave, x-45, y-56, 90, 100); continue; }
    ctx.save(); ctx.translate(x,y);
    ctx.fillStyle='#8a8f96';
    ctx.beginPath(); ctx.moveTo(-22,36); ctx.lineTo(-22,-16);
    ctx.arc(0,-16,22,Math.PI,0); ctx.lineTo(22,36); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#6d7178';
    ctx.fillRect(-28,30,56,10);
    ctx.strokeStyle='#5d6167'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-10,-14); ctx.lineTo(10,-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-10,-4); ctx.lineTo(10,-4); ctx.stroke();
    ctx.restore();
  }
}

function drawFogLayer(){
  const lanterns = [];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p = G.grid[r][c];
    if(p && p.key==='plantern') lanterns.push({x:cellX(c)+CELL_W/2, y:cellY(r)+CELL_H/2});
  }
  const t = G.t;
  for(let c=3;c<COLS;c++) for(let r=0;r<ROWS;r++){
    const cx0 = cellX(c)+CELL_W/2, cy0 = cellY(r)+CELL_H/2;
    let clear = false;
    for(const l of lanterns) if((l.x-cx0)**2+(l.y-cy0)**2 < (2.2*CELL_W)**2){ clear=true; break; }
    if(clear) continue;
    const a = c<4 ? .4 : c<5 ? .6 : .8;
    for(let k=0;k<2;k++){
      const bx = cx0+Math.sin(t*.5+r*2.1+c*1.3+k*3)*16, by = cy0+Math.cos(t*.4+c*2.2+k*1.7)*9;
      const g = ctx.createRadialGradient(bx,by,10,bx,by,74);
      g.addColorStop(0,'rgba(206,210,222,'+a+')'); g.addColorStop(1,'rgba(206,210,222,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(bx,by,74,0,7); ctx.fill();
    }
  }
}

function drawSun(x,y,rad,alpha){
  if(ASSETS.sun){
    ctx.save(); ctx.globalAlpha=alpha;
    const s=rad*2.6;
    ctx.drawImage(ASSETS.sun, x-s/2, y-s/2, s, s);
    ctx.restore(); return;
  }
  ctx.save(); ctx.globalAlpha=alpha;
  const g=ctx.createRadialGradient(x,y,2,x,y,rad);
  g.addColorStop(0,'#fff7ae'); g.addColorStop(.7,'#ffd42a'); g.addColorStop(1,'rgba(255,190,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,rad,0,7); ctx.fill();
  ctx.fillStyle='#ffca1c'; ctx.beginPath(); ctx.arc(x,y,rad*0.55,0,7); ctx.fill();
  ctx.restore();
}

/* ---- plant art (simple vector) ---- */
function drawPlant(p,x,y){
  const wob = Math.sin(p.t*3+p.wob)*2;
  ctx.save(); ctx.translate(x,y);
  // damage flash
  const dmg = p.hp/p.maxHp;
  const pim = ASSETS[plantSprite(p,dmg)];
  if(pim){
    ctx.translate(wob*0.4,0);
    if(p.asleep) ctx.globalAlpha = .75;
    ctx.drawImage(pim,-45,-56,90,100);
    if(p.asleep) drawZzz(p.t);
    ctx.restore(); return;
  }
  switch(p.key){
    case 'sunflower':
      stem();
      ctx.translate(wob,0);
      for(let i=0;i<10;i++){ ctx.save(); ctx.rotate(i*Math.PI/5);
        ctx.fillStyle='#ffd42a'; ellipse(0,-24,7,13); ctx.restore(); }
      ctx.fillStyle='#c98a2c'; circle(0,0,14,'#b57722');
      face(0,-2);
      break;
    case 'peashooter': shooterArt('#5ec431', wob); break;
    case 'snowpea':    shooterArt('#6fc7e8', wob); break;
    case 'repeater':   shooterArt('#3fa32a', wob, true); break;
    case 'wallnut': {
      ctx.fillStyle = dmg>.66?'#c99a4e':dmg>.33?'#b3853f':'#96702f';
      ellipse(0,4,26,32);
      ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=3; ctx.stroke();
      face(0,-4);
      if(dmg<=.66){ crack(-6,-14, 10); }
      if(dmg<=.33){ crack(8,-2, 14); }
      break;
    }
    case 'cherrybomb': {
      const puls = 1+Math.sin(p.t*20)*0.06;
      ctx.scale(puls,puls);
      ctx.fillStyle='#d42a2a'; circle(-11,2,15,'#a81f1f'); circle(12,-2,15,'#a81f1f');
      ctx.strokeStyle='#2c5a1e'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(-8,-10); ctx.quadraticCurveTo(0,-30,10,-14); ctx.stroke();
      break;
    }
    case 'potatomine': {
      const armed = p.armT>=14;
      if(!armed){
        ctx.fillStyle='#8a6a3c'; ellipse(0,20,18,10);
        ctx.fillStyle='#6d5330'; ellipse(0,14,8,6);
      } else {
        ctx.fillStyle='#b08c50'; ellipse(0,10,22,16);
        ctx.fillStyle= Math.sin(p.t*8)>0 ? '#ff4444':'#aa2222'; circle(0,-6,5);
        face(0,10);
      }
      break;
    }
    case 'squash': {
      const jt = p.squashT>=0 ? clamp((0.5-p.squashT)/0.5,0,1) : 0;
      if(jt>0){ ctx.translate((p.tx-x)*jt, -Math.sin(jt*Math.PI)*46); }
      ctx.fillStyle='#b8c23a'; ellipse(0,4,24,28);
      ctx.fillStyle='#98a52e'; ellipse(0,-20,12,9);
      face(0,0);
      ctx.strokeStyle='#222'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(-13,-12); ctx.lineTo(-3,-8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(13,-12); ctx.lineTo(3,-8); ctx.stroke();
      break;
    }
    case 'jalapeno': {
      const puls = 1+Math.sin(p.t*20)*0.06;
      ctx.scale(puls,puls);
      ctx.fillStyle='#d43a2a';
      ctx.beginPath(); ctx.ellipse(0,6,13,26,0.4,0,7); ctx.fill();
      ctx.strokeStyle='#2c5a1e'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(-10,-16); ctx.quadraticCurveTo(-2,-30,8,-22); ctx.stroke();
      face(-2,4);
      break;
    }
    case 'torchwood': {
      ctx.fillStyle='#8a5a2a'; ctx.fillRect(-15,-8,30,42);
      ctx.fillStyle='#6d451f'; ellipse(0,-8,15,7);
      const fl = 1+Math.sin(p.t*10)*.15;
      ctx.fillStyle='#ff9a2a'; ellipse(0,-24,8*fl,14*fl);
      ctx.fillStyle='#ffe27a'; ellipse(0,-21,4,8);
      face(0,14);
      break;
    }
    case 'tallnut': {
      ctx.fillStyle = dmg>.66?'#c99a4e':dmg>.33?'#b3853f':'#96702f';
      ellipse(0,-2,24,44);
      ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=3; ctx.stroke();
      face(0,-16);
      if(dmg<=.66){ crack(-6,-32, 12); }
      if(dmg<=.33){ crack(8,-10, 16); }
      break;
    }
    case 'sunshroom': {
      const big = (p.age||0)>60, s = big?1.25:0.85;
      ctx.scale(s,s);
      ctx.fillStyle='#e8c86a'; ellipse(0,-6,16,12);       // glowing cap
      ctx.fillStyle='#f5e29a'; ellipse(0,-10,10,6);
      ctx.fillStyle='#d8cba8'; ctx.fillRect(-5,0,10,20);  // stalk
      face(0,12);
      break;
    }
    case 'puffshroom': {
      ctx.fillStyle='#b48ad4'; ellipse(0,2,13,11);        // little purple cap
      ctx.fillStyle='#9b6cc0'; ellipse(0,-4,10,6);
      ctx.fillStyle='#e8dcc8'; ctx.fillRect(-4,10,8,14);
      face(0,18);
      break;
    }
    case 'fumeshroom': {
      ctx.fillStyle='#8a68b0'; ellipse(0,10,14,18);       // body
      ctx.fillStyle='#6cc084'; ellipse(8,-14,13,10);      // snout
      ctx.fillStyle='#4a9a62'; circle(16,-14,5);
      face(-4,-2);
      break;
    }
    case 'hypnoshroom': {
      ctx.fillStyle='#c05a9a'; ellipse(0,-8,17,13);       // swirly cap
      ctx.strokeStyle='#f0c8e0'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(0,-10,8,0,4.5); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,-10,4,2,5.8); ctx.stroke();
      ctx.fillStyle='#e8dcc8'; ctx.fillRect(-5,2,10,18);
      face(0,14);
      break;
    }
    case 'plantern': {
      stem(); ctx.translate(wob,0);
      const gl = ctx.createRadialGradient(0,-16,4,0,-16,26);
      gl.addColorStop(0,'rgba(255,240,170,.9)'); gl.addColorStop(1,'rgba(255,240,170,0)');
      ctx.fillStyle=gl; circle(0,-16,26);
      ctx.fillStyle='#e8d890'; ellipse(0,-16,11,14);      // lantern bulb
      ctx.strokeStyle='#8a7a3a'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,-30); ctx.lineTo(0,-2); ctx.stroke();
      break;
    }
    case 'chomper': {
      stem();
      ctx.translate(wob,0);
      const open = p.chewT>0 ? 0 : (Math.sin(p.t*4)*0.2+0.3);
      ctx.fillStyle='#9b4fd4';
      ctx.save(); ctx.rotate(-open); ellipse(4,-22,20,13); ctx.restore();
      ctx.save(); ctx.rotate(open*0.7); ctx.fillStyle='#7c3aad'; ellipse(4,-12,20,10); ctx.restore();
      if(p.chewT>0){ ctx.fillStyle='#7c3aad'; ellipse(2,-16,22,16); }
      break;
    }
  }
  if(p.asleep) drawZzz(p.t);
  ctx.restore();

  function stem(){ ctx.strokeStyle='#3f7a2b'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(0,34); ctx.quadraticCurveTo(-3+wob,10,wob,-6); ctx.stroke();
    ctx.fillStyle='#4c8f33'; ellipse(-10,30,10,5); ellipse(10,32,10,5); }
  function shooterArt(colr, wob, dbl){
    stem(); ctx.translate(wob,0);
    ctx.fillStyle=colr; circle(0,-14,17);
    ctx.fillStyle=colr; ellipse(16,-16,12,8);       // snout
    if(dbl) ellipse(-14,-16,10,7);
    ctx.fillStyle='#1e3d12'; circle(22,-16,4);      // muzzle
    face(-4,-16);
  }
  function face(fx,fy){
    ctx.fillStyle='#222';
    circle(fx-6,fy-2,2.6); circle(fx+6,fy-2,2.6);
    ctx.strokeStyle='#222'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(fx,fy+5,5,0.2,Math.PI-0.2); ctx.stroke();
  }
  function crack(cx,cy,len){ ctx.strokeStyle='#4a3618'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+4,cy+len*0.5); ctx.lineTo(cx-2,cy+len); ctx.stroke(); }
}
function circle(x,y,r,stroke){ ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.stroke(); } }
function drawZzz(t){
  ctx.save(); ctx.globalAlpha=.8;
  ctx.fillStyle='#e8e8ff'; ctx.font='bold 14px Trebuchet MS'; ctx.textAlign='center';
  const ph=(t%2)/2;
  ctx.fillText('z', 16, -30-ph*14);
  ctx.fillText('Z', 26, -42-ph*14);
  ctx.restore();
}
function ellipse(x,y,rx,ry){ ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,7); ctx.fill(); }

/* ---- zombie art ---- */
function drawZombie(z){
  const y = cellY(z.row)+CELL_H/2;
  let arcY = 0;
  if(z.jumpT>0){ const f=clamp(1-z.jumpT/0.5,0,1); arcY = -Math.sin(f*Math.PI)*70; }
  ctx.save(); ctx.translate(z.x, y+arcY);
  if(z.dead){ ctx.globalAlpha = 1-z.dead/0.8; ctx.rotate(z.dead*1.8); }
  const step = Math.sin(z.walk)* (z.eating? 1:4);
  const lean = z.eating ? Math.sin(z.walk*2)*0.06 : 0.08;
  ctx.rotate(-lean);

  // sprite version (cone/bucket that lost armor render as normal zombie)
  const zim = ASSETS[zombieSpriteName(z)];
  if(zim){
    ctx.save();
    if(z.hypno) ctx.filter='hue-rotate(300deg) saturate(140%) brightness(105%)';
    else if(z.slow>0) ctx.filter='saturate(60%) brightness(110%) hue-rotate(150deg)';
    if(z.hypno) ctx.scale(-1,1);   // hypnotized zombies walk the other way
    ctx.drawImage(zim, -55, -96+Math.abs(step)*0.6, 110, 140);
    ctx.restore();
    const tot2=z.hp+z.armor, mx2=ZOMBIES[z.type].hp+z.maxArmor;
    if(tot2<mx2){
      ctx.rotate(lean);
      ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(-18,-104,36,5);
      ctx.fillStyle='#6fd44a'; ctx.fillRect(-18,-104,36*clamp(tot2/mx2,0,1),5);
    }
    ctx.restore(); return;
  }

  // legs
  ctx.strokeStyle='#4a4a52'; ctx.lineWidth=7;
  ctx.beginPath(); ctx.moveTo(-4,14); ctx.lineTo(-8+step,40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,14); ctx.lineTo(10-step,40); ctx.stroke();
  // body
  ctx.fillStyle = z.slow>0 ? '#6a8ab5' : '#5b5b66';
  ellipse(0,0,16,20);
  // arm reaching forward
  ctx.strokeStyle= z.slow>0 ? '#7ba2cf' :'#6b6b78'; ctx.lineWidth=7;
  ctx.beginPath(); ctx.moveTo(-6,-6); ctx.lineTo(-26,-2+step); ctx.stroke();
  // head
  const hc = z.slow>0 ? '#a8c8e8' : ZOMBIES[z.type].color;
  ctx.fillStyle=hc; circle(-6,-30,14);
  // face
  ctx.fillStyle='#2a2a2a'; circle(-12,-32,2.5); circle(-2,-32,2.5);
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-14,-22); ctx.lineTo(-2,-24); ctx.stroke();
  // armor
  if(z.type==='cone' && z.armor>0){
    ctx.fillStyle='#e08a2c'; ctx.beginPath();
    ctx.moveTo(-6,-64); ctx.lineTo(-20,-38); ctx.lineTo(8,-38); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#b56a1c'; ctx.lineWidth=2; ctx.stroke();
  }
  if(z.type==='bucket' && z.armor>0){
    ctx.fillStyle='#9aa4ad'; ctx.fillRect(-22,-62,32,22);
    ctx.fillStyle='#7d868e'; ctx.fillRect(-22,-44,32,5);
  }
  if(z.type==='flag'){
    ctx.strokeStyle='#7a5a3a'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(12,-2); ctx.lineTo(12,-58); ctx.stroke();
    ctx.fillStyle='#c43a2a';
    ctx.beginPath(); ctx.moveTo(12,-58); ctx.lineTo(38,-50); ctx.lineTo(12,-42); ctx.closePath(); ctx.fill();
  }
  if(z.type==='runner'){
    ctx.fillStyle='#cc4444'; ctx.fillRect(-16,-46,20,5); // headband
  }
  if(z.type==='football' && z.armor>0){
    ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.arc(-6,-34,16,Math.PI*0.9,Math.PI*2.1); ctx.fill();
    ctx.strokeStyle='#e8e8e8'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-20,-30); ctx.lineTo(-6,-30); ctx.stroke(); // face mask
  }
  if(z.type==='newspaper'){
    if(z.armor>0){
      ctx.fillStyle='#d8d3c0'; ctx.fillRect(-36,-20,26,30);
      ctx.strokeStyle='#8a857a'; ctx.lineWidth=1;
      for(let i=0;i<4;i++){ ctx.beginPath(); ctx.moveTo(-33,-13+i*7); ctx.lineTo(-13,-13+i*7); ctx.stroke(); }
    } else {
      ctx.fillStyle='#ff3a2a'; circle(-12,-32,3); circle(-2,-32,3); // rage eyes
    }
  }
  if(z.type==='polevault' && z.vault){
    ctx.strokeStyle='#b59a6a'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(-30,12); ctx.lineTo(8,-54); ctx.stroke();
  }
  if(z.type==='jack'){
    ctx.fillStyle='#e0862c'; ctx.fillRect(-4,-12,20,20);
    ctx.strokeStyle='#7a4a12'; ctx.lineWidth=2; ctx.strokeRect(-4,-12,20,20);
    ctx.strokeStyle='#555';
    ctx.beginPath(); ctx.moveTo(16,-4); ctx.lineTo(24,-10+Math.sin(z.walk*2)*3); ctx.stroke();
  }
  if(z.type==='screendoor' && z.armor>0){
    ctx.fillStyle='rgba(150,160,170,.85)'; ctx.fillRect(-40,-52,18,66);
    ctx.strokeStyle='#6d7880'; ctx.lineWidth=2; ctx.strokeRect(-40,-52,18,66);
    ctx.lineWidth=1; ctx.strokeStyle='rgba(90,100,110,.7)';
    for(let i=1;i<4;i++){ ctx.beginPath(); ctx.moveTo(-40+i*4.5,-52); ctx.lineTo(-40+i*4.5,14); ctx.stroke(); }
    for(let i=1;i<8;i++){ ctx.beginPath(); ctx.moveTo(-40,-52+i*8); ctx.lineTo(-22,-52+i*8); ctx.stroke(); }
  }
  if(z.type==='dancer'){
    ctx.strokeStyle='#b08fc0'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(4,-8); ctx.lineTo(18,-40+Math.sin(z.walk*2)*6); ctx.stroke(); // arm up!
    ctx.fillStyle='#ffd42a'; circle(20,-46+Math.sin(z.walk*2)*6,3);
  }
  if(z.type==='backup'){
    ctx.fillStyle='#c05050'; ctx.fillRect(-14,-46,16,4); // red bandana
  }
  if(z.hypno){
    ctx.save(); ctx.globalAlpha=.45;
    ctx.fillStyle='#e060c0'; circle(-6,-30,15);
    ctx.restore();
    ctx.strokeStyle='#ff8ae0'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(-6,-30,17,0,7); ctx.stroke();
  }
  // hp bar when damaged
  const tot=z.hp+z.armor, mx=ZOMBIES[z.type].hp+z.maxArmor;
  if(tot<mx){
    ctx.rotate(lean);
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(-18,-72,36,5);
    ctx.fillStyle='#6fd44a'; ctx.fillRect(-18,-72,36*clamp(tot/mx,0,1),5);

function drawFx(){
  for(const f of G.fx){
    const t=f.t;
    if(f.kind==='boom'){
      ctx.save(); ctx.globalAlpha=1-t;
      const r= 30+t*130;
      const g=ctx.createRadialGradient(f.x,f.y,5,f.x,f.y,r);
      g.addColorStop(0,'#fff2ae'); g.addColorStop(.5,'#ff9a2a'); g.addColorStop(1,'rgba(200,40,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(f.x,f.y,r,0,7); ctx.fill(); ctx.restore();
    } else if(f.kind==='hit'||f.kind==='snowhit'||f.kind==='firehit'){
      ctx.save(); ctx.globalAlpha=1-t*1.4;
      ctx.fillStyle= f.kind==='snowhit'?'#bfe8f7':f.kind==='firehit'?'#ffb066':'#a8e07a';
      for(let i=0;i<4;i++) circle(f.x+Math.cos(i*1.6)*t*24, f.y+Math.sin(i*1.6)*t*24, 3);
      ctx.restore();
    } else if(f.kind==='fume'){
      ctx.save(); ctx.globalAlpha=(1-t)*.7;
      const spread = Math.min(1, t*3);
      const g2 = ctx.createLinearGradient(f.x,0,f.x+f.len*spread,0);
      g2.addColorStop(0,'rgba(140,220,140,.7)'); g2.addColorStop(1,'rgba(140,220,140,0)');
      ctx.fillStyle=g2;
      ctx.beginPath(); ctx.ellipse(f.x+f.len*spread/2, f.y, f.len*spread/2, 20, 0, 0, 7); ctx.fill();
      ctx.restore();
    } else if(f.kind==='firerow'){
      ctx.save(); ctx.globalAlpha=1-t;
      const y0 = cellY(f.row);
      const g = ctx.createLinearGradient(0,y0,0,y0+CELL_H);
      g.addColorStop(0,'rgba(255,200,60,0)'); g.addColorStop(.5,'#ff9a2a'); g.addColorStop(1,'rgba(255,60,0,0)');
      ctx.fillStyle=g; ctx.fillRect(GRID_X, y0+8, COLS*CELL_W, CELL_H-16);
      ctx.restore();
    } else if(f.kind==='chomp'){
      ctx.save(); ctx.globalAlpha=1-t; ctx.font='bold 20px Trebuchet MS'; ctx.fillStyle='#fff';
      ctx.fillText('GULP!', f.x-24, f.y-t*20); ctx.restore();
    }
  }
}

    ctx.fillStyle='#9aa4ad'; ctx.beginPath(); ctx.moveTo(-9,10); ctx.lineTo(9,10); ctx.lineTo(0,30); ctx.closePath(); ctx.fill();

function drawProgress(){
  const L=G.L, y=H-22;
  const w=280, x=W-w-24;
  const f = clamp(G.killed/L.total,0,1);
  if(ASSETS.progress_frame){
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(x,y-6,w,16);
    if(f>0 && ASSETS.progress_fill){
      const im=ASSETS.progress_fill;
      ctx.drawImage(im, 0,0, Math.max(1,Math.round(im.width*f)), im.height, x, y-6, w*f, 16);
    } else if(f>0){ ctx.fillStyle='#8fd44a'; ctx.fillRect(x,y-6,w*f,16); }
    ctx.drawImage(ASSETS.progress_frame, x-10, y-16, 300, 36);
  } else {
    ctx.fillStyle='rgba(0,0,0,.45)'; roundRect(x,y-6,w,16,8); ctx.fill();
    ctx.fillStyle='#8fd44a'; if(f>0){ roundRect(x,y-6,Math.max(14,w*f),16,8); ctx.fill(); }
  }
  // wave flags along the bar
  const marks = [...G.waveThresholds.map(t=>t/L.total), 1];
  for(const m of marks){
    const fx2 = x + (w-6)*m + 2;
    const passed = f >= m-0.001;
    ctx.strokeStyle='#e8dcc0'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(fx2, y-16); ctx.lineTo(fx2, y+2); ctx.stroke();
    ctx.fillStyle = passed ? '#ffd42a' : '#c43a2a';
    ctx.beginPath(); ctx.moveTo(fx2,y-16); ctx.lineTo(fx2-10,y-12); ctx.lineTo(fx2,y-8); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='#fff'; ctx.font='bold 13px Trebuchet MS'; ctx.textAlign='center';
  ctx.fillText(`${G.L.name}  —  ${G.killed}/${L.total}`, x+w/2, y+6);
  ctx.textAlign='left';
}

// set the largest bold font (≤ base px) that fits label into maxW
function fitFont(label, maxW, base){
  let s = base;
  ctx.font = 'bold '+s+'px Trebuchet MS';
  let m = ctx.measureText(label);
  while(m && m.width > maxW && s > 11){ s--; ctx.font='bold '+s+'px Trebuchet MS'; m = ctx.measureText(label); }
  return s;
}
function drawBtn(x,y,w,h,label,hot){
  const over = mouse.x>=x&&mouse.x<=x+w&&mouse.y>=y&&mouse.y<=y+h;
  if(ASSETS.button){
    ctx.save();
    if(over) ctx.filter='brightness(115%)';
    ctx.drawImage(ASSETS.button,x,y,w,h);
    ctx.restore();
  } else {
    ctx.fillStyle= over?'#8fd44a':'#5c9636'; roundRect(x,y,w,h,10); ctx.fill();
    ctx.strokeStyle='#2c5a1e'; ctx.lineWidth=3; ctx.stroke();
  }
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  const fs = fitFont(label, w*0.76, 22);
  ctx.fillText(label, x+w/2, y+h/2+fs*0.36);
}

}

let MENU_MUSIC_BTN = null;
let MENU_HOME_BTN = null;
function drawMenu(){

    ctx.font='16px Trebuchet MS'; ctx.fillStyle='rgba(255,255,255,.8)';
    ctx.fillText('a fan remake', W/2, 244);
  }

  // world tabs
  MENU_TABS.length=0;
  const tw=150, tgap=14, tx0=W/2-(3*(tw+tgap)-tgap)/2;
  WORLDS.forEach(([wk,wname],i)=>{

    ctx.save();
    if(ASSETS.button){
      if(active) ctx.filter='brightness(120%) saturate(120%)';
      else if(!hovT) ctx.filter='brightness(75%)';
      ctx.drawImage(ASSETS.button,x,y,tw,h);
    } else {
      ctx.fillStyle = active ? '#8fd44a' : hovT ? '#5c9636' : '#44702a';
      roundRect(x,y,tw,h,9); ctx.fill();
    }
    ctx.restore();
    if(active){ ctx.strokeStyle='#ffd42a'; ctx.lineWidth=3; roundRect(x,y,tw,h,9); ctx.stroke(); }
    ctx.fillStyle='#fff'; fitFont(wname, tw*0.7, 19);
    ctx.fillText(wname, x+tw/2, y+26);
    MENU_TABS.push({x,y,w:tw,h,wk});
  });

  MENU_BTNS.length=0;
  const wLevels = LEVELS.map((L,i)=>({L,i})).filter(o=>o.L.world===menuWorld);
  wLevels.forEach((o,j)=>{
    const L=o.L, i=o.i;
    const two = wLevels.length>5;

    const x = two ? (j<5 ? W/2-455 : W/2+15) : W/2-220;
    const y = 348+(j%5)*58;
    const open = i < unlocked;
    const hov = open && mouse.x>=x&&mouse.x<=x+w&&mouse.y>=y&&mouse.y<=y+h;
    if(ASSETS.button_wide){
      ctx.save();
      if(!open) ctx.filter='grayscale(90%) brightness(65%)';
      else if(hov) ctx.filter='brightness(115%)';
      ctx.drawImage(ASSETS.button_wide,x,y,w,h);
      ctx.restore();
    } else {
      ctx.fillStyle= open ? '#5c9636' : '#555';
      roundRect(x,y,w,h,10); ctx.fill();
      if(hov){ ctx.fillStyle='rgba(255,255,255,.15)'; roundRect(x,y,w,h,10); ctx.fill(); }
      ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=3; ctx.stroke();
    }
    ctx.fillStyle= open ? '#fff' : '#999';
    if(!open && ASSETS.lock){
      fitFont(L.name, w*0.62, 20);
      ctx.fillText(L.name, x+w/2+12, y+32);
      ctx.drawImage(ASSETS.lock, x+18, y+9, 24, 30);

      ctx.fillText(lbl, x+w/2, y+32);

/* ---- in-game pause & mute buttons ---- */
function drawMiniButtons(){
  // speed buttons
  for(const b of SPEED_BTNS){
    const over = mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h;
    const active = gameSpeed===b.s;
    const bgim = active ? (ASSETS.minibtn_active||ASSETS.minibtn) : ASSETS.minibtn;
    if(bgim){
      ctx.save(); if(over && !active) ctx.filter='brightness(112%)';
      ctx.drawImage(bgim, b.x, b.y, b.w, b.h); ctx.restore();
    } else {
      ctx.fillStyle = active ? '#ffd42a' : over ? 'rgba(40,28,12,.95)' : 'rgba(40,28,12,.75)';
      roundRect(b.x,b.y,b.w,b.h,7); ctx.fill();
      ctx.strokeStyle='rgba(255,220,120,.5)'; ctx.lineWidth=1.5; ctx.stroke();
    }
    ctx.fillStyle = active ? '#3a2a10' : '#ffd42a';
    ctx.font='bold 13px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText(b.s+'x', b.x+b.w/2, b.y+b.h/2+5);
  }
  ctx.textAlign='left';
  for(const [b,kind] of [[PBTN,'pause'],[MBTN,'mute']]){
    const over = mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h;
    if(ASSETS.minibtn){
      ctx.save(); if(over) ctx.filter='brightness(112%)';
      ctx.drawImage(ASSETS.minibtn, b.x, b.y, b.w, b.h); ctx.restore();
    } else {
      ctx.fillStyle = over ? 'rgba(40,28,12,.95)' : 'rgba(40,28,12,.75)';
      roundRect(b.x,b.y,b.w,b.h,7); ctx.fill();
      ctx.strokeStyle='rgba(255,220,120,.5)'; ctx.lineWidth=1.5; ctx.stroke();
    }
    const iconIm = kind==='pause' ? (paused?ASSETS.icon_play:ASSETS.icon_pause)
                                  : (muted?ASSETS.icon_sound_off:ASSETS.icon_sound_on);
    if(iconIm){ ctx.drawImage(iconIm, b.x+b.w/2-9, b.y+b.h/2-9, 18, 18); continue; }
    ctx.fillStyle='#ffd42a'; ctx.strokeStyle='#ffd42a';
    const cx=b.x+b.w/2, cy=b.y+b.h/2;
    if(kind==='pause'){
      if(paused){ ctx.beginPath(); ctx.moveTo(cx-4,cy-7); ctx.lineTo(cx+7,cy); ctx.lineTo(cx-4,cy+7); ctx.closePath(); ctx.fill(); }
      else { ctx.fillRect(cx-6,cy-7,4,14); ctx.fillRect(cx+2,cy-7,4,14); }
    } else {
      // speaker
      ctx.beginPath(); ctx.moveTo(cx-8,cy-3); ctx.lineTo(cx-3,cy-3); ctx.lineTo(cx+2,cy-8);
      ctx.lineTo(cx+2,cy+8); ctx.lineTo(cx-3,cy+3); ctx.lineTo(cx-8,cy+3); ctx.closePath(); ctx.fill();
      if(muted){ ctx.strokeStyle='#ff5a4a'; ctx.lineWidth=3;

/* ============================================================
   VERSUS lobby + PeerJS networking (WebRTC, host-authoritative)
   ------------------------------------------------------------
   The room CREATOR runs the whole simulation and streams compact
   state snapshots (~20/s) over a WebRTC data channel. The joiner
   sends only input intents (plant here / spawn zombie in row N /
   collect this sun / upgrade income) which the host validates and
   applies. This keeps both devices perfectly in sync with no
   server: PeerJS's free public broker only brokers the initial
   handshake, so the game deploys as a pure static site.
   ============================================================ */
let peer=null, conn=null, netConnected=false;
let lobbyStage='choice';           // choice | host | local | joinwait
let netStatus='';
let hostSide='plants';             // the side the HOST plays; guest gets the other
let guestSide='zombies';
let lobbyLevel=0;
let netCode='';
let lastSnap=0;
let connectTimer=null;
const LOBBY_BTNS=[];

// ICE servers: STUN helps peers discover their public address; TURN relays the
// data when a direct peer-to-peer link can't punch through (different networks,
// strict/symmetric NAT, cellular). Without TURN, cross-network games often hang.
const PEER_OPTS = { config: { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'turn:openrelay.metered.ca:80',  username:'openrelayproject', credential:'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username:'openrelayproject', credential:'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username:'openrelayproject', credential:'openrelayproject' },
] } };

function genCode(){
  const A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous chars
  let s=''; for(let i=0;i<4;i++) s+=A[Math.floor(Math.random()*A.length)];
  return s;
}
function netSend(obj){ try{ if(conn && conn.open) conn.send(obj); }catch(e){} }

function netHost(){ netRole='host'; netConnected=false; tryHostPeer(0); }
function tryHostPeer(attempt){
  netCode=genCode(); netStatus='Creating room…';
  try{ peer = new Peer('pvz2p-'+netCode, PEER_OPTS); }catch(e){ netStatus='PeerJS failed to load'; return; }
  peer.on('open', ()=>{ netStatus='Waiting for opponent to join…'; });
  peer.on('connection', c=>{ conn=c; wireConn(c); });
  peer.on('error', err=>{
    const t = err&&err.type;
    if(t==='unavailable-id' && attempt<5){ try{peer.destroy();}catch(e){} tryHostPeer(attempt+1); }
    else netStatus='Network error: '+(t||'unknown');
  });
}
function netJoin(code){
  netRole='guest'; netConnected=false; netCode=code; netStatus='Connecting to '+code+'…';
  try{ peer=new Peer(undefined, PEER_OPTS); }catch(e){ netStatus='PeerJS failed to load'; return; }
  peer.on('open', ()=>{ conn=peer.connect('pvz2p-'+code,{reliable:true}); wireConn(conn); });
  peer.on('error', err=>{
    const t=(err&&err.type)||'unknown';
    netStatus = t==='peer-unavailable' ? 'No room with that code — check it and try again.' : 'Network error: '+t;
  });
  // if the channel hasn't opened after a while, tell the player what to try
  clearTimeout(connectTimer);
  connectTimer = setTimeout(()=>{ if(!netConnected)
    netStatus='Still connecting… if it hangs, put both devices on the SAME Wi-Fi and start a fresh code.'; }, 12000);
}
function wireConn(c){
  c.on('open', ()=>{ netConnected=true; clearTimeout(connectTimer);
    netStatus = netRole==='host' ? 'Opponent connected — press Start!' : 'Connected! Waiting for host…';
  });
  c.on('data', d=>onNetData(d));
  c.on('close', ()=>onNetClose());
  c.on('error', ()=>{});
}
function onNetClose(){
  netConnected=false;
  if(state==='mp_playing'||state==='mp_wait'||state==='mp_choose'){
    if(G) G.winner = G.winner || 'draw';
    netStatus='Opponent disconnected'; state='mp_over';
  } else if(state==='lobby'){ netStatus='Opponent disconnected'; }
}
function teardownNet(){
  clearTimeout(connectTimer);
  try{ if(conn) conn.close(); }catch(e){}
  try{ if(peer) peer.destroy(); }catch(e){}
  conn=null; peer=null; netConnected=false; netRole=null; netStatus=''; lobbyStage='choice';
}
function leaveVersus(){
  if(netRole==='host'){ netSend({t:'over', winner: hostSide==='plants'?'zombies':'plants'}); }
  teardownNet(); G=null; mode='solo'; state='home';
}

function onNetData(d){
  if(!d||!d.t) return;
  if(d.t==='setup'){                 // guest learns its side + level
    mySide=d.guestSide; lobbyLevel=d.level; levelIdx=d.level;
    if(mySide==='plants'){ chooseLevelIdx=d.level; chosen=LEVELS[d.level].plants.slice(0,MAXSLOTS); state='mp_choose'; }
    else { state='mp_wait'; netStatus='Waiting for the plant player to choose…'; }
  } else if(d.t==='seeds'){          // host(zombies) got the plant player's loadout -> begin
    if(netRole==='host' && hostSide==='zombies'){ newVersus(lobbyLevel, d.seeds); netSend({t:'start', level:lobbyLevel, seeds:d.seeds}); }
  } else if(d.t==='start'){          // guest begins rendering; host runs the sim
    newVersus(d.level, d.seeds);
  } else if(d.t==='state'){          // guest applies host snapshot
    if(netRole==='guest' && G) applySnapshot(d.s);
  } else if(d.t==='input'){          // host applies guest intent
    if(netRole==='host') applyGuestInput(d);
  } else if(d.t==='over'){
    if(netRole==='guest'){ if(G) G.winner=d.winner; state='mp_over'; sfx(d.winner==='plants'?'win':'lose'); }
  }
}
function applyGuestInput(m){
  if(!G||!G.versus||state!=='mp_playing') return;
  if(m.a==='income'){ if(guestSide==='zombies') versusUpgradeIncome(); }
  else if(m.a==='spawn'){ if(guestSide==='zombies') versusSpawn(m.ztype, m.row); }
  else if(m.a==='sun'){ if(guestSide==='plants'){ const s=G.suns.find(s=>s.id===m.id); if(s&&!s.taken){ G.sun+=s.val; s.taken=true; sfx('sun'); } } }
  else if(m.a==='plant'){ if(guestSide==='plants'){ const seed=G.seeds.find(z=>z.key===m.key), d=PLANTS[m.key];
      if(seed&&seed.cd<=0&&G.sun>=d.cost&&!G.grid[m.r][m.c]&&!graveAt(m.r,m.c)){ G.sun-=d.cost; seed.cd=d.recharge; G.grid[m.r][m.c]=makePlant(m.key,m.r,m.c); sfx('plant'); } } }
  else if(m.a==='shovel'){ if(guestSide==='plants'&&G.grid[m.r][m.c]&&!graveAt(m.r,m.c)){ G.grid[m.r][m.c]=null; sfx('shovel'); } }
}

/* ---- state snapshot (host -> guest) ---- */
function serializeState(){
  const plants=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){ const p=G.grid[r][c]; if(!p) continue;
    plants.push({r,c,key:p.key,hp:p.hp,maxHp:p.maxHp,t:+p.t.toFixed(2),wob:p.wob,age:p.age||0,armT:p.armT||0,chewT:p.chewT||0,asleep:!!p.asleep,fuse:p.fuse}); }
  return {
    t:+G.t.toFixed(2), sun:Math.floor(G.sun), brains:Math.floor(G.brains), incomeLevel:G.incomeLevel,
    brainRate:+G.brainRate.toFixed(2), matchTime:+G.matchTime.toFixed(1), spawnGrace:+Math.max(0,G.spawnGrace).toFixed(1),
    winner:G.winner, startBanner:+Math.max(0,G.startBanner).toFixed(2), worldBanner:+Math.max(0,G.worldBanner||0).toFixed(2), shake:+Math.max(0,shake).toFixed(2),
    gspawnCd:+Math.max(0,G.gspawnCd||0).toFixed(2),
    seeds:G.seeds.map(s=>({key:s.key,cd:+Math.max(0,s.cd).toFixed(2)})),
    zseeds:G.zseeds.map(s=>({key:s.key,cd:+Math.max(0,s.cd).toFixed(2)})),
    plants,
    zombies:G.zombies.map(z=>({type:z.type,row:z.row,x:+z.x.toFixed(1),hp:z.hp,armor:z.armor,maxArmor:z.maxArmor,dead:z.dead||0,walk:+z.walk.toFixed(2),eat:!!z.eating,hypno:!!z.hypno,slow:z.slow>0?z.slow:0,vault:!!z.vault,jumpT:z.jumpT||0})),
    projectiles:G.projectiles.filter(p=>!(p.delay>0)).map(p=>({x:+p.x.toFixed(1),y:+p.y.toFixed(1),row:p.row,puff:!!p.puff,fire:!!p.fire,frozen:!!p.frozen})),
    suns:G.suns.filter(s=>!s.taken).map(s=>({id:s.id,x:+s.x.toFixed(1),y:+s.y.toFixed(1),wob:+s.wob.toFixed(2),life:+s.life.toFixed(2),val:s.val})),
    mowers:G.mowers.map(m=>({row:m.row,x:+m.x.toFixed(1),active:m.active,gone:m.gone})),
    fx:G.fx.map(f=>({x:f.x,y:f.y,kind:f.kind,txt:f.txt,t:+f.t.toFixed(2)})),
    graves:G.graves.map(g=>({r:g.r,c:g.c})),
  };
}
function applySnapshot(s){
  G.t=s.t; G.sun=s.sun; G.brains=s.brains; G.incomeLevel=s.incomeLevel; G.brainRate=s.brainRate;
  G.matchTime=s.matchTime; G.spawnGrace=s.spawnGrace; G.winner=s.winner; G.gspawnCd=s.gspawnCd||0;
  G.startBanner=s.startBanner; G.worldBanner=s.worldBanner; shake=s.shake;
  G.seeds=s.seeds.map(x=>({key:x.key,cd:x.cd}));
  G.zseeds=s.zseeds.map(x=>({key:x.key,cd:x.cd}));
  G.grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  for(const p of s.plants) G.grid[p.r][p.c]={key:p.key,hp:p.hp,maxHp:p.maxHp,t:p.t,wob:p.wob,age:p.age,armT:p.armT,chewT:p.chewT,asleep:p.asleep,fuse:p.fuse};
  G.zombies=s.zombies.map(z=>({type:z.type,row:z.row,x:z.x,hp:z.hp,armor:z.armor,maxArmor:z.maxArmor,dead:z.dead,walk:z.walk,eating:z.eat?{}:null,hypno:z.hypno,slow:z.slow,vault:z.vault,jumpT:z.jumpT}));
  G.projectiles=s.projectiles.map(p=>({x:p.x,y:p.y,row:p.row,puff:p.puff,fire:p.fire,frozen:p.frozen,delay:0}));
  G.suns=s.suns.map(x=>({id:x.id,x:x.x,y:x.y,ty:x.y,wob:x.wob,life:x.life,val:x.val,v:45}));
  G.mowers=s.mowers.map(m=>({row:m.row,x:m.x,active:m.active,gone:m.gone}));
  G.fx=s.fx.map(f=>({x:f.x,y:f.y,kind:f.kind,txt:f.txt,t:f.t}));
  G.graves=s.graves.map(g=>({r:g.r,c:g.c}));
}
// The guest renders between host snapshots by advancing motion + clocks locally,
// so movement and the timer look smooth instead of stepping at the network rate.
// Snapshots then gently correct these estimates when they arrive.
function guestTick(dt){
  if(!G) return;
  if(G.matchTime>0) G.matchTime -= dt;
  if(G.spawnGrace>0) G.spawnGrace -= dt;
  if(G.gspawnCd>0) G.gspawnCd -= dt;
  if(G.startBanner>0) G.startBanner -= dt;
  if(G.worldBanner>0) G.worldBanner -= dt;
  for(const z of G.zombies){
    z.walk = (z.walk||0) + dt*6;
    if(!z.dead && !z.eating && !(z.jumpT>0)){
      const base = (ZOMBIES[z.type] && ZOMBIES[z.type].speed) || 11;
      z.x -= base*(z.slow>0?0.5:1)*dt;
    }
  }
  for(const p of G.projectiles) p.x += 300*dt;         // peas travel right at ~300px/s
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){ const pl=G.grid[r][c]; if(pl) pl.t=(pl.t||0)+dt; }
  for(const s of G.suns){ if(s.y<s.ty) s.y=Math.min(s.ty, s.y+(s.v||45)*dt); s.wob=(s.wob||0)+dt*3; }
}

function startFromLobby(){
  if(netRole==='local'){ chooseLevelIdx=lobbyLevel; chosen=LEVELS[lobbyLevel].plants.slice(0,MAXSLOTS); state='mp_choose'; return; }

  guestSide = hostSide==='plants' ? 'zombies' : 'plants';
  mySide = hostSide;
  netSend({t:'setup', level:lobbyLevel, guestSide});
  if(hostSide==='plants'){ chooseLevelIdx=lobbyLevel; chosen=LEVELS[lobbyLevel].plants.slice(0,MAXSLOTS); state='mp_choose'; }

function handleLobbyClick(x,y){
  audioInit();
  for(const b of LOBBY_BTNS) if(hit(b,x,y)){
    const a=b.act;
    if(a==='back'){ teardownNet(); state='home'; }
    else if(a==='host'){ lobbyStage='host'; netHost(); }
    else if(a==='join'){ const code=(prompt('Enter the 4-character game code:')||'').trim().toUpperCase(); if(code){ lobbyStage='joinwait'; netJoin(code); } }
    else if(a==='local'){ netRole='local'; lobbyStage='local'; }
    else if(a==='side'){ hostSide = hostSide==='plants'?'zombies':'plants'; }
    else if(a==='prevlvl'){ lobbyLevel=(lobbyLevel-1+LEVELS.length)%LEVELS.length; }
    else if(a==='nextlvl'){ lobbyLevel=(lobbyLevel+1)%LEVELS.length; }
    else if(a==='start'){ startFromLobby(); }
    else if(a==='cancel'){ teardownNet(); state='lobby'; }
    return;
  }
}

/* ---- shared gameplay input helpers (used by solo AND versus, mouse + touch, with drag) ---- */
function canControlPlants(){ return !(G&&G.versus) || mySide==='plants' || netRole==='local'; }
function canControlZombies(){ return G&&G.versus && (mySide==='zombies' || netRole==='local'); }
function isAuthority(){ return netRole!=='guest'; }   // host & local mutate G directly; guest sends intents

// Which card (if any) is under the cursor for the side this device controls.
function cardAt(x,y){
  if(canControlZombies()){
    for(const rq of ZCARD_RECTS) if(x>=rq.x&&x<=rq.x+rq.w&&y>=rq.y&&y<=rq.y+rq.h) return {kind:'zombie',i:rq.i};
  }
  if(canControlPlants() && G.seeds){
    for(let i=0;i<G.seeds.length;i++){ const sx=seedX(i);
      if(x>=sx&&x<=sx+SEED_W&&y>=SEED_Y&&y<=SEED_Y+SEED_H) return {kind:'plant',i}; }
  }
  return null;
}
function selectPlantCard(i){
  const s=G.seeds[i], d=PLANTS[s.key];
  if(G.sun>=d.cost && s.cd<=0){ G.selected=i; G.shovel=false; if(G.versus) G.zselected=null; return true; }
  return false;
}
function selectZombieCard(i){ G.zselected=i; G.selected=null; G.shovel=false; return true; }
function collectSunAt(x,y){
  if(!canControlPlants()) return false;
  for(let i=G.suns.length-1;i>=0;i--){ const s=G.suns[i];
    if((x-s.x)**2+(y-s.y)**2<30*30){ if(isAuthority()){ G.sun+=s.val; s.taken=true; } else netSend({t:'input',a:'sun',id:s.id}); sfx('sun'); return true; } }
  return false;
}
function shovelButtonAt(x,y){
  if(!canControlPlants()) return false;
  if(x>=SHOVEL_X&&x<=SHOVEL_X+54&&y>=SEED_Y&&y<=SEED_Y+SEED_H){ G.shovel=!G.shovel; G.selected=null; if(G.versus)G.zselected=null; return true; }
  return false;
}
function gameControlButtons(x,y){
  if(G.versus){
    if(hit(VS_MUTE,x,y)){ muted=!muted; return true; }
    if(hit(VS_LEAVE,x,y)){ leaveVersus(); return true; }
    if(canControlZombies() && ZINCOME_RECT && hit(ZINCOME_RECT,x,y)){ if(isAuthority()) versusUpgradeIncome(); else netSend({t:'input',a:'income'}); return true; }
  } else {
    if(hit(PBTN,x,y)){ paused=true; return true; }
    if(hit(MBTN,x,y)){ muted=!muted; return true; }
    for(const b of SPEED_BTNS) if(hit(b,x,y)){ gameSpeed=b.s; return true; }
  }
  return false;
}
// Drop whatever is currently selected onto the lawn cell/row at (x,y).
function placeAtLawn(x,y){
  const c=Math.floor((x-GRID_X)/CELL_W), r=Math.floor((y-GRID_Y)/CELL_H);
  if(c<0||c>=COLS||r<0||r>=ROWS) return false;
  if(canControlZombies() && G.zselected!=null){
    const ztype=G.zseeds[G.zselected].key;
    if(isAuthority()) versusSpawn(ztype,r); else netSend({t:'input',a:'spawn',ztype,row:r});
    return true;
  }
  if(canControlPlants()){
    if(graveAt(r,c)) return false;
    if(G.shovel){
      if(isAuthority()){ if(G.grid[r][c]){ G.grid[r][c]=null; sfx('shovel'); } } else netSend({t:'input',a:'shovel',r,c});
      G.shovel=false; return true;
    }
    if(G.selected!=null && !G.grid[r][c]){
      const s=G.seeds[G.selected], d=PLANTS[s.key];
      if(G.sun>=d.cost){
        if(isAuthority()){ G.sun-=d.cost; s.cd=d.recharge; G.grid[r][c]=makePlant(s.key,r,c); sfx('plant'); }
        else netSend({t:'input',a:'plant',key:s.key,r,c});
        G.selected=null; return true;
      }
    }
  }
  return false;
}
function overLawn(x,y){ return x>=GRID_X && x<GRID_R && y>=GRID_Y && y<GRID_Y+ROWS*CELL_H; }

// pointer-down during play: handle buttons/sun/shovel immediately, and ARM a drag if a card was grabbed
let dragArmed=false, dragMoved=false, downX=0, downY=0;
function gameplayDown(x,y){
  audioInit(); downX=x; downY=y; dragArmed=false; dragMoved=false;
  if(gameControlButtons(x,y)) return;
  if(shovelButtonAt(x,y)) return;
  const card=cardAt(x,y);
  if(card){
    if(card.kind==='plant'){ if(selectPlantCard(card.i)) dragArmed=true; }
    else { selectZombieCard(card.i); dragArmed=true; }
    return;
  }
  if(collectSunAt(x,y)) return;
  // otherwise this may become a tap-to-place on the lawn (handled on pointer-up)
}
function gameplayUp(x,y){
  if(dragArmed && dragMoved){                 // a real drag from a card -> drop it
    if(overLawn(x,y)) placeAtLawn(x,y);        // released off-lawn keeps the card selected for click-to-place
    dragArmed=false; dragMoved=false; return;
  }
  const moved = Math.abs(x-downX)>8 || Math.abs(y-downY)>8;
  if(!moved && overLawn(x,y)) placeAtLawn(x,y);// simple tap on the lawn with a card already selected
  dragArmed=false; dragMoved=false;
}

/* ============================================================
   Input
   ============================================================ */
function canvasPos(e){
  const r=cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) };
}
cv.addEventListener('pointermove', e=>{ mouse=canvasPos(e);
  if(dragArmed && (Math.abs(mouse.x-downX)>6||Math.abs(mouse.y-downY)>6)) dragMoved=true; });
cv.addEventListener('pointerdown', e=>{
  if((state==='playing'||state==='mp_playing') && !paused){ mouse=canvasPos(e); gameplayDown(mouse.x,mouse.y); }
});
cv.addEventListener('pointerup', e=>{
  if((state==='playing'||state==='mp_playing') && !paused){ const p=canvasPos(e); gameplayUp(p.x,p.y); }
});
cv.addEventListener('click', e=>{
  // gameplay (when not paused) is driven by pointerdown/up above — skip it here
  if((state==='playing'||state==='mp_playing') && !paused) return;
  audioInit(); // browsers only allow audio after a user gesture
  const {x,y}=canvasPos(e);
  if(state==='home'){ handleHomeClick(x,y); return; }
  if(state==='lobby'){ handleLobbyClick(x,y); return; }
  if(state==='mp_wait'){ if(x>=W/2-85&&x<=W/2+85&&y>=H/2+46&&y<=H/2+94) leaveVersus(); return; }
  if(state==='mp_over'){ for(const b of VS_OVER_BTNS) if(hit(b,x,y)){ if(b.act==='again') versusRematch(); else leaveVersus(); } return; }
  if(state==='menu'){
    const mb = MENU_MUSIC_BTN;
    if(MENU_HOME_BTN && hit(MENU_HOME_BTN,x,y)){ mode='solo'; state='home'; return; }
    if(mb && x>=mb.x&&x<=mb.x+mb.w&&y>=mb.y&&y<=mb.y+mb.h){ cycleMusic(); return; }
    for(const tb of MENU_TABS) if(x>=tb.x&&x<=tb.x+tb.w&&y>=tb.y&&y<=tb.y+tb.h){ menuWorld=tb.wk; return; }
    for(const b of MENU_BTNS) if(b.open && x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){ startLevel(b.i); return; }
    return;
  }
  if(state==='choose'||state==='mp_choose'){
    for(const cd of CHOOSE_CARDS){
      if(x>=cd.x&&x<=cd.x+cd.w&&y>=cd.y&&y<=cd.y+cd.h){
        const idx = chosen.indexOf(cd.k);
        if(idx>=0) chosen.splice(idx,1);
        else if(chosen.length<MAXSLOTS) chosen.push(cd.k);
        return;
      }
    }
    if(x>=W/2-190&&x<=W/2-20&&y>=H-90&&y<=H-42){          // Back
      if(state==='mp_choose'){ if(netRole==='guest') netSend({t:'input',a:'noop'}); leaveVersus(); }
      else state='menu';
      return;
    }
    if(x>=W/2+20&&x<=W/2+190&&y>=H-90&&y<=H-42){          // Confirm
      if(!chosen.length) return;
      if(state==='choose'){ newGame(chooseLevelIdx, chosen); }
      else {   // mp_choose: the plant player is done picking
        if(netRole==='guest'){ netSend({t:'seeds', seeds:chosen.slice()}); state='mp_wait'; netStatus='Waiting for the host to start…'; }
        else { newVersus(chooseLevelIdx, chosen); netSend({t:'start', level:chooseLevelIdx, seeds:chosen.slice()}); }
      }
      return;
    }
    return;
  }
  if(state==='won'||state==='lost'){
    if(x>=W/2-190&&x<=W/2-20&&y>=H/2+50&&y<=H/2+98){ newGame(levelIdx, lastSeeds); return; }
    if(x>=W/2+20&&x<=W/2+190&&y>=H/2+50&&y<=H/2+98){
      if(state==='won'&&levelIdx+1<LEVELS.length) startLevel(levelIdx+1); else state='menu';
      return;
    }
    return;
  }
  // ---- playing ----
  // pause menu
  if(paused){
    for(const b of PAUSE_BTNS){
      if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){
        if(b.act==='resume') paused=false;
        else if(b.act==='restart'){ newGame(levelIdx, lastSeeds); }
        else if(b.act==='menu'){ paused=false; state='menu'; }
        else if(b.act==='mute') muted=!muted;
        else if(b.act==='music') cycleMusic();
        return;
      }
    }
    return;
  }
  // pause / mute / speed mini buttons
  if(x>=PBTN.x&&x<=PBTN.x+PBTN.w&&y>=PBTN.y&&y<=PBTN.y+PBTN.h){ paused=true; return; }
  if(x>=MBTN.x&&x<=MBTN.x+MBTN.w&&y>=MBTN.y&&y<=MBTN.y+MBTN.h){ muted=!muted; return; }
  for(const b of SPEED_BTNS){
    if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){ gameSpeed=b.s; return; }
  }
  // collect sun first (highest priority)
  for(let i=G.suns.length-1;i>=0;i--){
    const s=G.suns[i];
    if((x-s.x)**2+(y-s.y)**2 < 30*30){ G.sun+=s.val; s.taken=true; sfx('sun'); return; }
  }
  // seed packets
  for(let i=0;i<G.seeds.length;i++){
    const sx=seedX(i);
    if(x>=sx&&x<=sx+SEED_W&&y>=SEED_Y&&y<=SEED_Y+SEED_H){
      const s=G.seeds[i], d=PLANTS[s.key];
      if(G.sun>=d.cost&&s.cd<=0){ G.selected = (G.selected===i?null:i); G.shovel=false; }
      return;
    }
  }
  // shovel
  if(x>=SHOVEL_X&&x<=SHOVEL_X+54&&y>=SEED_Y&&y<=SEED_Y+SEED_H){
    G.shovel=!G.shovel; G.selected=null; return;
  }
  // lawn
  const c=Math.floor((x-GRID_X)/CELL_W), r=Math.floor((y-GRID_Y)/CELL_H);
  if(c>=0&&c<COLS&&r>=0&&r<ROWS){
    if(graveAt(r,c)) return;   // can't plant (or dig) on a grave
    if(G.shovel){
      if(G.grid[r][c]){ G.grid[r][c]=null; G.shovel=false; sfx('shovel'); }
      return;
    }
    if(G.selected!==null && !G.grid[r][c]){
      const s=G.seeds[G.selected], d=PLANTS[s.key];
      if(G.sun>=d.cost){
        G.sun-=d.cost; s.cd=d.recharge;
        G.grid[r][c]=makePlant(s.key,r,c);
        G.selected=null;
        sfx('plant');
      }
    }
  }
});
window.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(state==='choose') state='menu';
    else if(state==='mp_playing'){ if(G){ G.selected=null; G.shovel=false; G.zselected=null; } }
    else if(paused) paused=false;
    else if(G){ G.selected=null; G.shovel=false; }
  }
  if(e.key==='m'||e.key==='M'){ muted=!muted; }
  if((e.key==='p'||e.key==='P') && state==='playing'){ paused=!paused; }
});

/* ============================================================
   Main loop
   ============================================================ */
let last = performance.now();
function loop(now){
  const dt = clamp((now-last)/1000, 0, 0.05);
  last = now;
  // run the sim multiple times per frame for fast-forward (keeps physics exact)
  for(let i=0;i<gameSpeed;i++) update(dt);
  // guest smooths motion + clocks locally between host snapshots
  if(netRole==='guest' && state==='mp_playing') guestTick(dt);
  // host streams authoritative state to the guest (~15 Hz — lighter payload, less lag)
  if(netRole==='host' && conn && conn.open && (state==='mp_playing'||state==='mp_over') && now-lastSnap>66){
    lastSnap = now; netSend({t:'state', s:serializeState()});
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
